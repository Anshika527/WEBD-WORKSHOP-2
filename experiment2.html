<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TechStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">TechStore</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="#">About</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Product Cards -->
    <div class="container my-5">
      <div class="row g-4">
        
        <!-- Laptop Card -->
        <div class="col-md-4">
          <div class="card h-100">
            <img src="https://www.digitaltrends.com/uploads/2024/07/surface-laptop-7-06-e1746774119939.jpg"  height="250px" class="card-img-top" alt="Laptop">
            <div class="card-body">
              <h5 class="card-title">Laptop <span class="badge bg-success">New</span></h5>
              <p class="card-text">High performance laptop</p>
              <p class="fw-bold">₹50,000</p>
              <a href="#" class="btn btn-primary">View Details</a>
            </div>
          </div>
        </div>

        <!-- Mobile Card -->
        <div class="col-md-4">
          <div class="card h-100">
            <img src="https://www.91-img.com/pictures/170418-v8-samsung-galaxy-s26-ultra-mobile-phone-large-1.jpg?tr=w-150,c-at_max,q-70" height="250px" alt="Mobile">
            <div class="card-body">
              <h5 class="card-title">Mobile <span class="badge bg-danger">Sale</span></h5>
              <p class="card-text">Latest smartphone</p>
              <p class="fw-bold">₹30,000</p>
              <a href="#" class="btn btn-primary">View Details</a>
            </div>
          </div>
        </div>

        <!-- Headphones Card -->
        <div class="col-md-4">
          <div class="card h-100">
            <img src="https://media-ik.croma.com/prod/https://media.tatacroma.com/Croma%20Assets/Entertainment/Headphones%20and%20Earphones/Images/303328_0_ZL9udV-_B.png?updatedAt=1760543938492"  height="250px" class="card-img-top" alt="Headphones">
            <div class="card-body">
              <h5 class="card-title">Headphones <span class="badge bg-success">New</span></h5>
              <p class="card-text">Noise cancelling</p>
              <p class="fw-bold">₹5,000</p>
              <a href="#" class="btn btn-primary">View Details</a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-light text-center p-3">
      <p>© 2026 TechStore | Follow us on social media</p>
      <p>ANSHIKA
      </p>
      <p>
        2503201000230
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
