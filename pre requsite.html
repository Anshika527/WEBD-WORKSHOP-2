<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name ="viewport" content="width-device-width, initial scale=1.0">
        <title>Pre-requisite</title>
        

    <style>
        
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            padding: 15px 40px;
        }

        .navbar h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .navbar ul li {
            cursor: pointer;
        }

        .navbar ul li:hover {
            color: #a2f430;
        }

        
        .hero {
            text-align: center;
            padding: 120px 20px;
            background: rgba(0, 0, 0, 0);
        }

        .hero h2 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
        }
nn
        .btn {
            padding: 15px 40px;
            background: #f4c430;
            border: none;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background: orange;
        }

       
        .modes {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.8);
        }

        .mode-card {
            background: paleturquoise;
            padding: 30px;
            width: 200px;
            text-align: center;
            border-radius: 10px;
            transition: 0.3s;
        }

        

        footer {
            text-align: center;
            padding: 20px;
            background: papayawhip;
        }
    </style>
    </head>
    <body>
        <div class="hero">
        <img src="https://d.player.one/en/full/190522/today-we-learn-about-main-menu.jpg">
        <h2>WELCOME TO THE BATTLEFIELD</h2>
        <p>Experience intense multiplayer action and survival combat.</p>
        
        <button class="btn">START GAME</button>
        <button class="btn">STORE</button>
    </div>

    
    <div class="modes">
        <div class="mode-card">
            <h3>Multiplayer</h3>
            <p>Team Deathmatch, Domination & more.</p>
        </div>

        <div class="mode-card">
            <h3>Battle Royale</h3>
            <p>Survive and be the last one standing.</p>
        </div>

        <div class="mode-card">
            <h3>Ranked Match</h3>
            <p>Compete and climb the leaderboard.</p>
        </div>
    </div>

    <footer>
        © 2026 Call of Duty Fan Page 
    </footer>

</body>
        
   
</html>
